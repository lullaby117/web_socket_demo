<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>佐巴扬聊天室</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>💬 WebSocket 聊天室</h1>

    <!-- 登录区域 -->
    <div id="loginForm" class="login-form">
        <input type="text" id="username" placeholder="输入你的昵称..." />
        <button onclick="connect()">加入聊天</button>
    </div>

    <!-- 聊天区域（初始隐藏） -->
    <div id="chatArea" style="display:none;">
        <div id="userStatus" class="user-status"></div>
        <div id="messageArea" class="message-area"></div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="输入消息..." />
            <button onclick="sendMessage()">发送</button>
            <button onclick="sendPrivateMessage()">私聊</button>
            <button onclick="disconnect()">退出</button>
        </div>

        <div class="private-chat">
            <label>私聊目标：</label>
            <input type="text" id="targetUser" placeholder="输入对方昵称" />
        </div>
    </div>
</div>

<!-- 引入依赖库 -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script src="app.js"></script>
</body>
</html>
